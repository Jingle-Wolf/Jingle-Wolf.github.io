<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的时光机</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>

<body>
    <div id="dynamic-bg"></div>
    <div id="intro-overlay">
        <div class="quote-box">
            <p id="quote-text">正在加载专属记忆...</p>
            <button id="enter-btn" style="display:none;">开启我们的时光机</button>
        </div>
    </div>
 <!-- 时间轴主体内容区 -->
    <main class="timeline-container">
        <!-- 🌟 新增：浪漫头部区域 -->
        <header class="hero-header">
            <h1 class="main-title">遇见你，是所有时光的开始</h1>
            <p class="sub-title">Among millions of people, I meet the one I am supposed to meet.</p>
            <div class="title-decorator">
                <span></span> 
                <i>♥</i>      
                <span></span> 
            </div>
        </header>
        
        <div id="timeline-wrapper">
            <!-- 这里的节点会由JS自动生成 -->
        </div>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
